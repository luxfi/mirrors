name: mirror

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  packages: write
  contents: read

jobs:
  mirror:
    runs-on: lux-build-linux-amd64
    strategy:
      fail-fast: false
      matrix:
        image:
          - billing
          - commerce
          - console
          - cloud
          - cloud-api
          - ingress
          - id
          - insights
          - iam
          - kms
    steps:
      - name: Install crane
        run: |
          mkdir -p "$HOME/bin"
          if ! [ -x "$HOME/bin/crane" ]; then
            curl -fsSL https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_x86_64.tar.gz \
              | tar -xz -C "$HOME/bin" crane
            chmod +x "$HOME/bin/crane"
          fi
          echo "$HOME/bin" >> "$GITHUB_PATH"
          "$HOME/bin/crane" version

      - name: Login to ghcr.io (hanzoai pull)
        env:
          HANZOAI_PULL_TOKEN: ${{ secrets.HANZOAI_PULL_TOKEN }}
        run: |
          echo "$HANZOAI_PULL_TOKEN" | crane auth login ghcr.io -u hanzo-dev --password-stdin

      - name: Login to ghcr.io (luxfi push)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GH_TOKEN" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Mirror ${{ matrix.image }} (multi-arch)
        run: |
          SRC="ghcr.io/hanzoai/${{ matrix.image }}:latest"
          DST="ghcr.io/luxfi/${{ matrix.image }}:latest"
          echo "Mirroring $SRC -> $DST (all archs)"
          crane copy "$SRC" "$DST"

      - name: Verify
        run: |
          crane digest "ghcr.io/luxfi/${{ matrix.image }}:latest"
          crane manifest "ghcr.io/luxfi/${{ matrix.image }}:latest" | head -40
